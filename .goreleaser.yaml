version: 2

project_name: apple-compose

before:
  hooks:
    - go mod tidy

builds:
  - id: apple-compose
    main: .
    binary: apple-compose
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: apple-compose
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: git
  format: "{{.Message}}"
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "^Merge pull request"
      - "^Merge branch"
  groups:
    - title: "New features"
      regexp: "^feat"
      order: 0
    - title: "Bug fixes"
      regexp: "^fix"
      order: 1
    - title: "Other"
      order: 999

brews:
  - name: apple-compose
    homepage: "https://github.com/Rhevin/apple-compose"
    description: "Docker Compose orchestrator for Apple Containers — run docker-compose.yml on Apple Silicon without Docker Desktop or OrbStack"
    license: "MIT"
    repository:
      owner: rhevin
      name: homebrew-apple-compose
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "apple-compose"
    test: |
      assert_match "Docker Compose-compatible", shell_output("#{bin}/apple-compose --help")

release:
  github:
    owner: rhevin
    name: apple-compose
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
