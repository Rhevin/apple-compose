name: apple-compose

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
      POSTGRES_USER: app
      # PGDATA points to a tmpfs-friendly location inside the container
      PGDATA: /tmp/pgdata
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - db
      - redis
    restart: unless-stopped

# Named volumes removed — Apple container virtiofs mounts don't support
# chown/chmod from within containers. Use PGDATA=/tmp/pgdata for postgres.
